name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: '2.2.0'

      - name: Check compilation
        run: nim check src/nim_arango.nim

      - name: Build package
        run: nim c -c src/nim_arango.nim

      - name: Run tests
        run: nimble test

      - name: Build examples
        run: nimble examples

  test-integration:
    runs-on: ubuntu-latest
    needs: build

    services:
      arangodb:
        image: arangodb:3.11
        env:
          ARANGO_ROOT_PASSWORD: password
        ports:
          - 8529:8529

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: '2.2.0'

      - name: Wait for ArangoDB
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8529/_api/version && break
            sleep 1
          done

      - name: Run integration tests
        run: |
          nim c --path:src -r tests/test_integration.nim
